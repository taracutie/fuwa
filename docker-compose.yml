services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fuwa
      POSTGRES_PASSWORD: fuwa
      POSTGRES_DB: fuwa
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuwa -d fuwa"]
      interval: 5s
      timeout: 5s
      retries: 10
